version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: safepulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:

# Note: Postgres is provided by Supabase (managed)
